<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Student Study Planner{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}

</head>

<body>

<!-- ===============================
     Loading Spinner
================================ -->

<div id="loader">

    <div class="spinner-border text-primary" role="status">

        <span class="visually-hidden">
            Loading...
        </span>

    </div>

</div>

<!-- ===============================
     Mobile Menu Button
================================ -->

<button
    id="menuBtn"
    class="btn btn-primary d-md-none position-fixed"
    style="top:15px;left:15px;z-index:2000;">

    <i class="bi bi-list"></i>

</button>

<!-- ===============================
     Flash Messages
================================ -->

<div class="container mt-3">

{% with messages=get_flashed_messages(with_categories=true) %}

{% if messages %}

{% for category,message in messages %}

<div class="alert alert-{{ category }} alert-dismissible fade show shadow">

    {{ message }}

    <button
        class="btn-close"
        data-bs-dismiss="alert">

    </button>

</div>

{% endfor %}

{% endif %}

{% endwith %}

</div>

<!-- ===============================
     Page Content
================================ -->

{% block content %}

{% endblock %}

<!-- ===============================
     Scroll To Top
================================ -->

<button
    id="topBtn"
    class="btn btn-primary rounded-circle">

    ↑

</button>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ChartJS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Custom JS -->

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

{% block extra_js %}

{% endblock %}

<!-- ===============================
     Auto Hide Alerts
================================ -->

<script>

setTimeout(function(){

document.querySelectorAll(".alert").forEach(function(alert){

bootstrap.Alert.getOrCreateInstance(alert).close();

});

},3000);

</script>

<!-- ===============================
     Loading Screen
================================ -->

<script>

window.onload=function(){

document.getElementById("loader").style.display="none";

};

</script>

<!-- ===============================
     Scroll To Top
================================ -->

<script>

const topBtn=document.getElementById("topBtn");

window.onscroll=function(){

if(document.body.scrollTop>200||

document.documentElement.scrollTop>200){

topBtn.style.display="block";

}

else{

topBtn.style.display="none";

}

};

topBtn.onclick=function(){

window.scrollTo({

top:0,

behavior:"smooth"

});

};

</script>

<!-- ===============================
     Sidebar Toggle
================================ -->

<script>

const menu=document.getElementById("menuBtn");

const sidebar=document.getElementById("sidebar");

if(menu && sidebar){

menu.onclick=function(){

sidebar.classList.toggle("active");

};

}

</script>

</body>

</html>
