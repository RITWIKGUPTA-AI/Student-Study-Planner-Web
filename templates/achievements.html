{% extends "base.html" %}

{% block title %}
Achievements
{% endblock %}

{% block content %}

<div class="container mt-4">

<h2>🏆 Achievements</h2>

<hr>

<form method="POST">

<div class="row">

<div class="col-md-4">

<input
class="form-control"
name="title"
placeholder="Achievement Title"
required>

</div>

<div class="col-md-5">

<input
class="form-control"
name="description"
placeholder="Description"
required>

</div>

<div class="col-md-2">

<input
type="date"
class="form-control"
name="date"
required>

</div>

<div class="col-md-1">

<button class="btn btn-success w-100">

Add

</button>

</div>

</div>

</form>

<hr>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>Title</th>

<th>Description</th>

<th>Date</th>

<th>Delete</th>

</tr>

</thead>

<tbody>

{% for achievement in achievements %}

<tr>

<td>{{ achievement.title }}</td>

<td>{{ achievement.description }}</td>

<td>{{ achievement.date }}</td>

<td>

<a
href="{{ url_for('achievements.delete_achievement', index=loop.index0) }}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
