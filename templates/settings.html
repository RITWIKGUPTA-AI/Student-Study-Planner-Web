{% extends "base.html" %}

{% block title %}
Settings
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>⚙️ Application Settings</h2>

        <a href="/dashboard" class="btn btn-primary">

            ← Dashboard

        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <form method="POST">

                <!-- Theme -->

                <div class="mb-4">

                    <label class="form-label">

                        🎨 Theme

                    </label>

                    <select
                        class="form-select"
                        name="theme">

                        <option value="Light"
                        {% if settings.theme=="Light" %}
                        selected
                        {% endif %}>

                            Light

                        </option>

                        <option value="Dark"
                        {% if settings.theme=="Dark" %}
                        selected
                        {% endif %}>

                            Dark

                        </option>

                    </select>

                </div>

                <!-- Notifications -->

                <div class="mb-4">

                    <label class="form-label">

                        🔔 Notifications

                    </label>

                    <select
                        class="form-select"
                        name="notifications">

                        <option value="On"
                        {% if settings.notifications=="On" %}
                        selected
                        {% endif %}>

                            On

                        </option>

                        <option value="Off"
                        {% if settings.notifications=="Off" %}
                        selected
                        {% endif %}>

                            Off

                        </option>

                    </select>

                </div>

                <!-- Font Size -->

                <div class="mb-4">

                    <label class="form-label">

                        🔠 Font Size

                    </label>

                    <select
                        class="form-select"
                        name="font_size">

                        <option value="Small"
                        {% if settings.font_size=="Small" %}
                        selected
                        {% endif %}>

                            Small

                        </option>

                        <option value="Medium"
                        {% if settings.font_size=="Medium" %}
                        selected
                        {% endif %}>

                            Medium

                        </option>

                        <option value="Large"
                        {% if settings.font_size=="Large" %}
                        selected
                        {% endif %}>

                            Large

                        </option>

                    </select>

                </div>

                <!-- Language -->

                <div class="mb-4">

                    <label class="form-label">

                        🌍 Language

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="language"
                        value="{{ settings.language }}">

                </div>

                <div class="d-flex gap-2">

                    <button
                        class="btn btn-success">

                        💾 Save Settings

                    </button>

                    <button
                        type="submit"
                        name="action"
                        value="reset"
                        class="btn btn-secondary">

                        🔄 Reset Default

                    </button>
                </div>

            </form>

        </div>

    </div>

    <!-- Current Settings Summary -->

    <div class="card shadow mt-4">

        <div class="card-header bg-primary text-white">

            Current Settings

        </div>

        <div class="card-body">

            <div class="row text-center">

                <div class="col-md-3">

                    <h6>Theme</h6>

                    <h5>{{ settings.theme }}</h5>

                </div>

                <div class="col-md-3">

                    <h6>Notifications</h6>

                    <h5>{{ settings.notifications }}</h5>

                </div>

                <div class="col-md-3">

                    <h6>Font Size</h6>

                    <h5>{{ settings.font_size }}</h5>

                </div>

                <div class="col-md-3">

                    <h6>Language</h6>

                    <h5>{{ settings.language }}</h5>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
