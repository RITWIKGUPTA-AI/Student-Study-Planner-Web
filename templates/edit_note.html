{% extends "base.html" %}

{% block title %}
Edit Note
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">

            ✏ Edit Note

        </h2>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Title

                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ note.title }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Subject

                </label>

                <input
                    type="text"
                    name="subject"
                    class="form-control"
                    value="{{ note.subject }}">

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Content

                </label>

                <textarea
                    name="content"
                    rows="8"
                    class="form-control"
                    required>{{ note.content }}</textarea>

            </div>

            <button class="btn btn-success">

                💾 Save Changes

            </button>

            <a
                href="/notes"
                class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
