{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>AI Quiz Generator</h2>

    <form method="POST">

        <input type="text"
               name="topic"
               class="form-control"
               placeholder="Enter topic (e.g. Thermodynamics)"
               required>

        <button class="btn btn-warning mt-3">
            Generate Quiz
        </button>

    </form>

    {% if quiz %}

    <div class="card mt-4 p-3">
        <pre style="white-space: pre-wrap;">{{ quiz }}</pre>
    </div>

    {% endif %}

</div>

{% endblock %}
