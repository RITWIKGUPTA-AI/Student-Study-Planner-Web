{% extends "base.html" %}

{% block title %}
Edit Timetable
{% endblock %}

{% block content %}

<div class="wrapper">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3 class="text-center">🎓 Study Planner</h3>

        <hr>

        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/subjects">📚 Subjects</a>
        <a href="/tasks">✅ Tasks</a>
        <a href="/planner">📖 Study Planner</a>
        <a href="/timetable">🗓️ Timetable</a>
        <a href="/notes">📝 Notes</a>
        <a href="/goals">🎯 Goals</a>
        <a href="/attendance">📊 Attendance</a>
        <a href="/analytics">📈 Analytics</a>

        <hr>

        <a href="/logout">🚪 Logout</a>

    </div>

    <!-- Main Content -->

    <div class="content">

        <div class="topbar d-flex justify-content-between align-items-center">

            <h2>✏ Edit Timetable</h2>

            <a href="/timetable" class="btn btn-secondary">

                ← Back

            </a>

        </div>

        <div class="container-fluid mt-4">

            <div class="card shadow p-4">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Day

                        </label>

                        <select
                            name="day"
                            class="form-select"
                            required>

                            <option value="Monday"
                            {% if entry.day=="Monday" %}selected{% endif %}>
                            Monday
                            </option>

                            <option value="Tuesday"
                            {% if entry.day=="Tuesday" %}selected{% endif %}>
                            Tuesday
                            </option>

                            <option value="Wednesday"
                            {% if entry.day=="Wednesday" %}selected{% endif %}>
                            Wednesday
                            </option>

                            <option value="Thursday"
                            {% if entry.day=="Thursday" %}selected{% endif %}>
                            Thursday
                            </option>

                            <option value="Friday"
                            {% if entry.day=="Friday" %}selected{% endif %}>
                            Friday
                            </option>

                            <option value="Saturday"
                            {% if entry.day=="Saturday" %}selected{% endif %}>
                            Saturday
                            </option>

                            <option value="Sunday"
                            {% if entry.day=="Sunday" %}selected{% endif %}>
                            Sunday
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Subject

                        </label>

                        <input
                            type="text"
                            name="subject"
                            class="form-control"
                            value="{{ entry.subject }}"
                            required>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <label class="form-label">

                                Start Time

                            </label>

                            <input
                                type="time"
                                name="start_time"
                                class="form-control"
                                value="{{ entry.start_time }}"
                                required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">

                                End Time

                            </label>

                            <input
                                type="time"
                                name="end_time"
                                class="form-control"
                                value="{{ entry.end_time }}"
                                required>

                        </div>

                    </div>

                    <br>

                    <button class="btn btn-success">

                        💾 Save Changes

                    </button>

                    <a
                        href="/timetable"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
