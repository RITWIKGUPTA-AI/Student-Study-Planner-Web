{% extends "base.html" %}

{% block title %}
Edit Study Plan
{% endblock %}

{% block content %}

<div class="wrapper">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3 class="text-center">🎓 Study Planner</h3>

        <hr>

        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/subjects">📚 Subjects</a>
        <a href="/tasks">✅ Tasks</a>
        <a href="/planner">📖 Planner</a>
        <a href="/notes">📝 Notes</a>
        <a href="/goals">🎯 Goals</a>
        <a href="/attendance">📊 Attendance</a>
        <a href="/analytics">📈 Analytics</a>

        <hr>

        <a href="/logout">🚪 Logout</a>

    </div>

    <!-- Main Content -->

    <div class="content">

        <div class="topbar d-flex justify-content-between align-items-center">

            <h2>✏ Edit Study Plan</h2>

            <a href="/planner" class="btn btn-secondary">

                ← Back

            </a>

        </div>

        <div class="container-fluid mt-4">

            <div class="card shadow p-4">

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Subject

                            </label>

                            <input
                                type="text"
                                name="subject"
                                class="form-control"
                                value="{{ plan.subject }}"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Topic

                            </label>

                            <input
                                type="text"
                                name="topic"
                                class="form-control"
                                value="{{ plan.topic }}"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Duration (Minutes)

                            </label>

                            <input
                                type="number"
                                name="duration"
                                class="form-control"
                                value="{{ plan.duration }}"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Study Date

                            </label>

                            <input
                                type="date"
                                name="date"
                                class="form-control"
                                value="{{ plan.date }}"
                                required>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Status

                        </label>

                        <select
                            name="status"
                            class="form-select">

                            <option
                                value="Pending"
                                {% if plan.status=="Pending" %}selected{% endif %}>

                                Pending

                            </option>

                            <option
                                value="Completed"
                                {% if plan.status=="Completed" %}selected{% endif %}>

                                Completed

                            </option>

                        </select>

                    </div>

                    <button class="btn btn-success">

                        💾 Save Changes

                    </button>

                    <a
                        href="/planner"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
