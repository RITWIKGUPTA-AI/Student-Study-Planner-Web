{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="wrapper">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3 class="text-center">🎓 Study Planner</h3>

        <hr>

        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/subjects">📚 Subjects</a>
        <a href="/tasks">✅ Tasks</a>
        <a href="/planner">📖 Study Planner</a>
        <a href="/timetable">🗓️ Timetable</a>
        <a href="/notes">📝 Notes</a>
        <a href="/goals">🎯 Goals</a>
        <a href="/attendance">📊 Attendance</a>
        <a href="/analytics">📈 Analytics</a>
        <a href="/reminders">🔔 Reminders</a>
        <a href="/profile">👤 Profile</a>

        <hr>

        <a href="/logout">🚪 Logout</a>

    </div>

    <!-- Main Content -->

    <div class="content">

        <div class="topbar d-flex justify-content-between align-items-center">

            <h2>✏ Edit Profile</h2>

            <a href="/profile" class="btn btn-secondary">

                ← Back

            </a>

        </div>

        <div class="container-fluid mt-4">

            <div class="card shadow p-4">

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ profile.name }}"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                value="{{ profile.email }}"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Phone

                            </label>

                            <input
                                type="text"
                                name="phone"
                                class="form-control"
                                value="{{ profile.phone }}">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Class

                            </label>

                            <input
                                type="text"
                                name="class"
                                class="form-control"
                                value="{{ profile.class }}">

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                School / College

                            </label>

                            <input
                                type="text"
                                name="school"
                                class="form-control"
                                value="{{ profile.school }}">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                City

                            </label>

                            <input
                                type="text"
                                name="city"
                                class="form-control"
                                value="{{ profile.city }}">

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Target Exam

                        </label>

                        <input
                            type="text"
                            name="target_exam"
                            class="form-control"
                            value="{{ profile.target_exam }}"
                            placeholder="JEE / NEET / Boards / UPSC">

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Bio

                        </label>

                        <textarea
                            name="bio"
                            class="form-control"
                            rows="4"
                            placeholder="Write something about yourself...">{{ profile.bio }}</textarea>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success">

                        💾 Save Profile

                    </button>

                    <a
                        href="/profile"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
