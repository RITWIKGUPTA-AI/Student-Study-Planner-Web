{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2>Create Account</h2>

    <form method="POST">

        <label>Name</label>
        <input class="form-control" 
               type="text" 
               name="name"
               required>


        <label class="mt-3">Username</label>
        <input class="form-control" 
               type="text" 
               name="username"
               required>


        <label class="mt-3">Password</label>
        <input class="form-control" 
               type="password" 
               name="password"
               required>


        <button class="btn btn-primary mt-4">
            Create Account
        </button>

    </form>

</div>

{% endblock %}
